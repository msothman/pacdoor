name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint (critical errors only)
        run: ruff check src/ --select F401,F841,F821,E741

      - name: Verify CLI entry point
        run: python -m pacdoor --help

      - name: Verify module discovery
        run: |
          python -c "
          from pacdoor.core.module_registry import ModuleRegistry
          r = ModuleRegistry()
          r.discover_modules()
          count = r.count()
          print(f'Discovered {count} modules')
          assert count >= 50, f'Expected 50+ modules, got {count}'
          "

      - name: Verify core imports
        run: |
          python -c "
          from pacdoor.core.engine import Engine
          from pacdoor.core.planner import Planner
          from pacdoor.core.fact_store import FactStore
          from pacdoor.core.scope import ScopeEnforcer
          from pacdoor.core.models import Host, Finding, Credential
          from pacdoor.report.generator import ReportGenerator
          from pacdoor.db.database import Database
          from pacdoor.cli import parse_args
          print('All core imports OK')
          "
