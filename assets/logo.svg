<g transform="translate(305, 340)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

<!--
  PRECISE MATH:
  5 rings: r=60, 95, 130, 165, 200
  Spacing = 35
  Mouth = 35° each side (70° total)
  
  For angle θ from positive x-axis:
  x = r*cos(θ), y = -r*sin(θ)  [SVG y is flipped]
  
  Mouth upper edge: θ = +35° → (r*0.8192, -r*0.5736)
  Mouth lower edge: θ = -35° → (r*0.8192,  r*0.5736)
  
  Cardinal points used for gaps/connectors:
  90°  (top):    (0, -r)
  135° (top-L):  (-r*0.7071, -r*0.7071)
  180° (left):   (-r, 0)
  225° (bot-L):  (-r*0.7071,  r*0.7071)
  270° (bottom): (0, r)
  315° (bot-R):  (r*0.7071,  r*0.7071)
  
  Gap width ≈ 18° arc
  Connector at exact angle between rings
-->

<!-- ===================== -->
<!-- RING 5: r=200        -->
<!-- ===================== -->
