id: spring-actuator-exposed
info:
  name: Spring Boot Actuator Endpoints Exposed
  severity: high
  description: >
    Spring Boot Actuator management endpoints are publicly accessible
    without authentication.  The /actuator/env endpoint reveals all
    environment variables which often contain database credentials, API
    keys, and other secrets.  Other endpoints such as /actuator/heapdump
    can leak full memory contents including session tokens and passwords.
  classification:
    cvss-score: 7.5
  reference:
    - https://docs.spring.io/spring-boot/docs/current/reference/html/actuator.html
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/05-Enumerate_Infrastructure_and_Application_Admin_Interfaces
  remediation: >
    Restrict actuator endpoints to authenticated users only by configuring
    Spring Security.  Move management endpoints to a separate port that is
    not publicly accessible.  At minimum disable sensitive endpoints such
    as env, heapdump, and shutdown in production.

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/health"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "activeProfiles"
          - "propertySources"
          - "systemProperties"
