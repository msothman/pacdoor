id: directory-listing
info:
  name: Directory Listing Enabled
  severity: low
  description: >
    Directory listing is enabled on the web server, allowing attackers
    to enumerate files and discover sensitive resources that are not
    intended to be publicly accessible.
  classification:
    cvss-score: 3.7
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information
  remediation: >
    Disable directory listing in your web server configuration.
    For Apache remove 'Options Indexes' or add 'Options -Indexes'.
    For Nginx remove 'autoindex on'.

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "Index of /"
