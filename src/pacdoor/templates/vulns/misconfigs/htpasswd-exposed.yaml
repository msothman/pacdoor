id: htpasswd-exposed
info:
  name: ".htpasswd File Exposed"
  severity: high
  description: >
    An .htpasswd file is publicly accessible on the web server.  This
    file contains usernames and password hashes used for HTTP Basic
    Authentication.  The password hashes can be cracked offline using
    tools like hashcat or John the Ripper, especially if weak
    passwords were used.  Common hash formats found in .htpasswd
    include bcrypt, MD5 (apr1), SHA-1, and DES crypt.  Compromised
    credentials may grant access to protected areas of the application
    or be reused on other systems.
  classification:
    cvss-score: 7.5
  reference:
    - https://httpd.apache.org/docs/2.4/howto/auth.html
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information
  remediation: >
    Block access to .htpasswd files in the web server configuration.
    For Apache add 'RedirectMatch 404 /\\.htpasswd'.  For Nginx add
    'location ~ /\\.htpasswd { deny all; }'.  Move .htpasswd files
    outside the web root.  If the file was exposed, rotate all
    passwords immediately and check for credential reuse.

http:
  - method: GET
    path:
      - "{{BaseURL}}/.htpasswd"
      - "{{BaseURL}}/.htpasswd.bak"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: regex
        part: body
        regex:
          - "[a-zA-Z0-9_-]+:\\$apr1\\$"
          - "[a-zA-Z0-9_-]+:\\$2[aby]?\\$"
          - "[a-zA-Z0-9_-]+:\\{SHA\\}"
